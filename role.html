<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resource Booking System - Select Role</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="alertContainer"></div>

    <div class="role-container">
        <div class="role-card">
            <h1>Select Your Role</h1>
            <p class="text-muted">Choose how you will use the booking system</p>

            <div class="role-options">
                <div class="role-option" data-role="student">
                    <div class="icon">👨‍🎓</div>
                    <div class="name">Student</div>
                    <div class="description">Book medical & meeting rooms</div>
                </div>

                <div class="role-option" data-role="teacher">
                    <div class="icon">👨‍🏫</div>
                    <div class="name">Teacher</div>
                    <div class="description">Book all resources</div>
                </div>

                <div class="role-option" data-role="admin">
                    <div class="icon">👨‍💼</div>
                    <div class="name">Admin</div>
                    <div class="description">Manage all bookings</div>
                </div>
            </div>

            <button id="selectRoleBtn" class="btn btn-primary btn-lg mt-lg">
                Continue
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
